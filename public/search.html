<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>検索 — Inv-tube</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body class="page-search">
  <header>
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-inv">Inv</span><span class="logo-tube">-tube</span>
      </a>
      <div class="search-wrapper">
        <form class="search-form" id="searchForm">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="動画を検索..."
            autocomplete="off"
          />
          <button type="submit" class="search-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="18" height="18"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </form>
        <ul id="suggestions" class="suggestions-list" hidden></ul>
      </div>
      <nav class="header-nav">
        <a href="/dl" class="header-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          ダウンロード
        </a>
        <a href="/library" class="header-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          ライブラリ
        </a>
        <a href="/settings" class="header-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          設定
        </a>
      </nav>
    </div>
  </header>

  <div class="filter-bar" id="filterBar">
    <div class="filter-bar-inner">

      <div class="filter-group">
        <label class="filter-label">並び順</label>
        <select id="sortSelect" class="filter-select">
          <option value="relevance">関連度順</option>
          <option value="rating">評価順</option>
          <option value="upload_date">投稿日順</option>
          <option value="view_count">再生回数順</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">投稿日</label>
        <select id="dateSelect" class="filter-select">
          <option value="">すべて</option>
          <option value="hour">1時間以内</option>
          <option value="today">今日</option>
          <option value="week">今週</option>
          <option value="month">今月</option>
          <option value="year">今年</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">動画長</label>
        <select id="durationSelect" class="filter-select">
          <option value="">すべて</option>
          <option value="short">短い（4分未満）</option>
          <option value="medium">普通（4〜20分）</option>
          <option value="long">長い（20分以上）</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">種別</label>
        <select id="typeSelect" class="filter-select">
          <option value="all">すべて</option>
          <option value="video">動画</option>
          <option value="channel">チャンネル</option>
          <option value="playlist">再生リスト</option>
          <option value="movie">映画</option>
          <option value="show">番組</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">機能</label>
        <div class="features-wrap">
          <button type="button" class="features-toggle" id="featuresToggle">
            <span id="featuresLabel">すべて</span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="features-dropdown" id="featuresDropdown" hidden>
            <label class="feature-item"><input type="checkbox" value="hd" /> HD</label>
            <label class="feature-item"><input type="checkbox" value="4k" /> 4K</label>
            <label class="feature-item"><input type="checkbox" value="live" /> ライブ配信</label>
            <label class="feature-item"><input type="checkbox" value="subtitles" /> 字幕あり</label>
            <label class="feature-item"><input type="checkbox" value="hdr" /> HDR</label>
            <label class="feature-item"><input type="checkbox" value="360" /> 360度</label>
            <label class="feature-item"><input type="checkbox" value="vr180" /> VR180</label>
            <label class="feature-item"><input type="checkbox" value="3d" /> 3D</label>
            <label class="feature-item"><input type="checkbox" value="creative_commons" /> CC</label>
          </div>
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label">地域</label>
        <select id="regionSelect" class="filter-select region-select-sm"></select>
      </div>

    </div>
  </div>

  <main>
    <div class="result-header" id="resultHeader" hidden>
      <span id="resultInfo"></span>
    </div>
    <div id="resultGrid" class="video-grid"></div>
    <div class="pagination" id="pagination" hidden>
      <button id="prevBtn" class="page-btn" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
        前のページ
      </button>
      <span id="pageInfo" class="page-info"></span>
      <button id="nextBtn" class="page-btn">
        次のページ
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
